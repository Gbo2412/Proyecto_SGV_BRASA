<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGV BRASA - Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#0ea5e9' } } } }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white border-b">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-brand">SGV BRASA</h1>
                <div class="flex gap-4">
                    <a href="index.html" class="px-3 py-2 rounded hover:bg-gray-100">Dashboard</a>
                    <a href="ventas.html" class="px-3 py-2 rounded bg-brand text-white">Ventas</a>
                    <a href="pagos.html" class="px-3 py-2 rounded hover:bg-gray-100">Pagos</a>
                    <a href="clientes.html" class="px-3 py-2 rounded hover:bg-gray-100">Clientes</a>
                    <a href="productos.html" class="px-3 py-2 rounded hover:bg-gray-100">Productos</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">Ventas</h2>
            <button onclick="toggleForm()" class="bg-brand text-white px-6 py-2 rounded hover:bg-blue-600">
                Nueva Venta
            </button>
        </div>

        <!-- Formulario Nueva Venta -->
        <div id="formVenta" class="hidden bg-white p-6 rounded-lg shadow mb-8">
            <h3 class="text-xl font-bold mb-4">Crear Nueva Venta</h3>
            <form onsubmit="crearVenta(event)" class="space-y-4">
                <!-- Cliente: Selector con opción de crear nuevo -->
                <div>
                    <label class="block text-sm font-medium mb-1">Cliente *</label>
                    <select id="cliente_select" onchange="handleClienteChange()" required class="w-full border rounded px-3 py-2">
                        <option value="">Seleccionar cliente...</option>
                        <option value="nuevo">+ Crear nuevo cliente</option>
                    </select>
                    <p class="text-sm text-gray-500 mt-1">Selecciona un cliente existente o crea uno nuevo</p>
                </div>

                <!-- Formulario de nuevo cliente (oculto por defecto) -->
                <div id="nuevoClienteForm" class="hidden bg-blue-50 border border-blue-200 p-4 rounded space-y-3">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-semibold text-blue-900">Nuevo Cliente</h4>
                        <button type="button" onclick="cancelarNuevoCliente()" class="text-sm text-blue-600 hover:text-blue-800">
                            Cancelar
                        </button>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Nombre del Cliente *</label>
                        <input type="text" id="nuevo_cliente_nombre" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Email</label>
                        <input type="email" id="nuevo_cliente_email" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Teléfono</label>
                        <input type="tel" id="nuevo_cliente_telefono" class="w-full border rounded px-3 py-2">
                    </div>
                </div>

                <!-- Producto: Selector con auto-completado de monto -->
                <div>
                    <label class="block text-sm font-medium mb-1">Producto *</label>
                    <select id="producto_select" onchange="handleProductoChange()" required class="w-full border rounded px-3 py-2">
                        <option value="">Seleccionar producto...</option>
                    </select>
                    <p class="text-sm text-gray-500 mt-1">El monto se completará automáticamente pero puedes editarlo</p>
                </div>

                <!-- Monto Total (editable, pre-cargado del producto) -->
                <div>
                    <label class="block text-sm font-medium mb-1">Monto Total *</label>
                    <input type="number" id="monto_total" step="0.01" required class="w-full border rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Tipo de Pago</label>
                    <select id="tipo_pago" onchange="toggleCuotas()" class="w-full border rounded px-3 py-2">
                        <option value="contado">Contado</option>
                        <option value="cuotas">Cuotas</option>
                    </select>
                </div>

                <div id="divCuotas" class="hidden">
                    <label class="block text-sm font-medium mb-1">Número de Cuotas</label>
                    <input type="number" id="num_cuotas" min="2" value="3" class="w-full border rounded px-3 py-2">
                </div>

                <div class="flex gap-4">
                    <button type="submit" class="bg-brand text-white px-6 py-2 rounded hover:bg-blue-600">
                        Crear Venta
                    </button>
                    <button type="button" onclick="toggleForm()" class="border px-6 py-2 rounded hover:bg-gray-100">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Lista de Ventas -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-4 py-3 text-left">ID</th>
                        <th class="px-4 py-3 text-left">Cliente</th>
                        <th class="px-4 py-3 text-left">Producto</th>
                        <th class="px-4 py-3 text-right">Monto Total</th>
                        <th class="px-4 py-3 text-right">Pagado</th>
                        <th class="px-4 py-3 text-right">Saldo</th>
                        <th class="px-4 py-3 text-center">Estado</th>
                    </tr>
                </thead>
                <tbody id="listaVentas">
                    <tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">No hay ventas registradas</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let esNuevoCliente = false;
        let productoSeleccionado = null;

        function toggleForm() {
            const form = document.getElementById('formVenta');
            form.classList.toggle('hidden');
            if (!form.classList.contains('hidden')) {
                cargarClientesEnSelector();
                cargarProductosEnSelector();
            }
        }

        function toggleCuotas() {
            const tipoPago = document.getElementById('tipo_pago').value;
            const divCuotas = document.getElementById('divCuotas');
            divCuotas.classList.toggle('hidden', tipoPago === 'contado');
        }

        function cargarClientesEnSelector() {
            const clientes = JSON.parse(localStorage.getItem('clientes') || '[]');
            const select = document.getElementById('cliente_select');

            let options = '<option value="">Seleccionar cliente...</option>';
            options += '<option value="nuevo">+ Crear nuevo cliente</option>';

            clientes.forEach(c => {
                options += `<option value="${c.id}">${c.nombre}${c.email ? ' - ' + c.email : ''}</option>`;
            });

            select.innerHTML = options;
        }

        function cargarProductosEnSelector() {
            const productos = JSON.parse(localStorage.getItem('productos') || '[]');
            const select = document.getElementById('producto_select');

            let options = '<option value="">Seleccionar producto...</option>';

            productos.forEach(p => {
                options += `<option value="${p.id}" data-nombre="${p.nombre}" data-precio="${p.precio_base}">
                    ${p.nombre} - S/ ${p.precio_base.toFixed(2)}
                </option>`;
            });

            select.innerHTML = options;
        }

        function handleClienteChange() {
            const select = document.getElementById('cliente_select');
            const nuevoForm = document.getElementById('nuevoClienteForm');

            if (select.value === 'nuevo') {
                esNuevoCliente = true;
                nuevoForm.classList.remove('hidden');
                document.getElementById('nuevo_cliente_nombre').required = true;
            } else {
                esNuevoCliente = false;
                nuevoForm.classList.add('hidden');
                document.getElementById('nuevo_cliente_nombre').required = false;
            }
        }

        function cancelarNuevoCliente() {
            document.getElementById('cliente_select').value = '';
            document.getElementById('nuevoClienteForm').classList.add('hidden');
            esNuevoCliente = false;
            document.getElementById('nuevo_cliente_nombre').required = false;
        }

        function handleProductoChange() {
            const select = document.getElementById('producto_select');
            const option = select.options[select.selectedIndex];

            if (option.value) {
                const precio = parseFloat(option.dataset.precio);
                document.getElementById('monto_total').value = precio.toFixed(2);
            }
        }

        function crearVenta(e) {
            e.preventDefault();

            const ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
            const clientes = JSON.parse(localStorage.getItem('clientes') || '[]');

            let clienteId, clienteNombre;

            // Gestión de cliente: nuevo o existente
            if (esNuevoCliente) {
                const nombre = document.getElementById('nuevo_cliente_nombre').value;
                const email = document.getElementById('nuevo_cliente_email').value;
                const telefono = document.getElementById('nuevo_cliente_telefono').value;

                if (!nombre) {
                    alert('❌ El nombre del cliente es requerido');
                    return;
                }

                // Crear nuevo cliente
                clienteId = `CLI-2024-${String(clientes.length + 1).padStart(3, '0')}`;
                const nuevoCliente = {
                    id: clienteId,
                    nombre: nombre,
                    email: email,
                    telefono: telefono
                };

                clientes.push(nuevoCliente);
                localStorage.setItem('clientes', JSON.stringify(clientes));
                clienteNombre = nombre;
            } else {
                clienteId = document.getElementById('cliente_select').value;
                if (!clienteId) {
                    alert('❌ Debes seleccionar un cliente');
                    return;
                }
                const cliente = clientes.find(c => c.id === clienteId);
                clienteNombre = cliente.nombre;
            }

            // Obtener producto seleccionado
            const productoSelect = document.getElementById('producto_select');
            const productoOption = productoSelect.options[productoSelect.selectedIndex];
            const productoNombre = productoOption.dataset.nombre;

            const id = `V-2024-${String(ventas.length + 1).padStart(3, '0')}`;

            const venta = {
                id,
                fecha: new Date().toISOString().split('T')[0],
                cliente_id: clienteId,
                cliente_nombre: clienteNombre,
                producto_id: productoSelect.value,
                producto_nombre: productoNombre,
                monto_total: parseFloat(document.getElementById('monto_total').value),
                tipo_pago: document.getElementById('tipo_pago').value,
                num_cuotas: document.getElementById('tipo_pago').value === 'cuotas'
                    ? parseInt(document.getElementById('num_cuotas').value)
                    : 1,
                monto_pagado: 0,
                estado: 'PENDIENTE'
            };

            ventas.push(venta);
            localStorage.setItem('ventas', JSON.stringify(ventas));

            alert('✅ Venta creada exitosamente' + (esNuevoCliente ? ' (Cliente nuevo creado)' : ''));

            // Reset form
            toggleForm();
            e.target.reset();
            document.getElementById('nuevoClienteForm').classList.add('hidden');
            esNuevoCliente = false;

            loadVentas();
        }

        function loadVentas() {
            const ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
            const pagos = JSON.parse(localStorage.getItem('pagos') || '[]');

            // Calcular monto pagado
            ventas.forEach(venta => {
                const pagosVenta = pagos.filter(p => p.venta_id === venta.id);
                venta.monto_pagado = pagosVenta.reduce((sum, p) => sum + parseFloat(p.monto || 0), 0);
                venta.saldo_pendiente = venta.monto_total - venta.monto_pagado;
                venta.estado = venta.saldo_pendiente <= 0 ? 'PAGADO' : 'PENDIENTE';
            });

            const html = ventas.reverse().map(v => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-4 py-3 font-mono text-sm">${v.id}</td>
                    <td class="px-4 py-3">${v.cliente_nombre}</td>
                    <td class="px-4 py-3">${v.producto_nombre}</td>
                    <td class="px-4 py-3 text-right font-semibold">S/ ${v.monto_total.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right text-green-600">S/ ${v.monto_pagado.toFixed(2)}</td>
                    <td class="px-4 py-3 text-right text-yellow-600">S/ ${v.saldo_pendiente.toFixed(2)}</td>
                    <td class="px-4 py-3 text-center">
                        <span class="px-2 py-1 rounded text-xs font-semibold ${
                            v.estado === 'PAGADO' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                        }">
                            ${v.estado}
                        </span>
                    </td>
                </tr>
            `).join('');

            document.getElementById('listaVentas').innerHTML = html ||
                '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">No hay ventas registradas</td></tr>';
        }

        loadVentas();
    </script>
</body>
</html>
